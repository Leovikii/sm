name: Auto Build sm.sh

on:
  push:
    branches:
      - main
    paths:
      - 'shell/src/**'
      - 'shell/build.sh'
  pull_request:
    branches:
      - main
    paths:
      - 'shell/src/**'
      - 'shell/build.sh'

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build sm.sh
        run: bash shell/build.sh

      - name: Create Release
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Extract version from config.sh
          VERSION=$(grep '^SCRIPT_VERSION=' shell/src/config.sh | cut -d'"' -f2)
          if [ -z "$VERSION" ]; then
            echo "Failed to extract version from config.sh"
            exit 1
          fi
          
          TAG="v$VERSION"
          
          # Check if it's a pre-release
          PRERELEASE=""
          if [[ "$VERSION" =~ alpha|beta|rc|test ]]; then
            PRERELEASE="--prerelease"
            echo "Version $VERSION is a pre-release."
          fi
          
          # Delete existing release/tag if it exists to allow overwriting the same version during dev
          gh release delete "$TAG" --yes || true
          git push --delete origin "$TAG" || true
          
          # Create new release
          echo "Creating release $TAG..."
          gh release create "$TAG" shell/sm.sh --title "Release $TAG" --generate-notes $PRERELEASE
