name: Compile Sing-Box Rules

# 允许 workflow 使用 GITHUB_TOKEN 推送编译结果
permissions:
  contents: write

on:
  push:
    paths:
      - 'rule-set/**/*.json'
  workflow_dispatch:

jobs:
  compile_rules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download & extract latest Sing-Box release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # 使用 GitHub 官方 CLI 工具稳定下载，避免 curl API 导致 IP 限流
          gh release download -R SagerNet/sing-box --pattern "*linux-amd64.tar.gz" --clobber
          
          # 解压并重命名
          tar -zxvf sing-box-*-linux-amd64.tar.gz
          extracted_dir=$(ls -d sing-box-*-linux-amd64 | head -n1)
          mv "$extracted_dir" sing-box
          chmod +x sing-box/sing-box
          rm -f sing-box-*-linux-amd64.tar.gz

      - name: Compile rule-set JSON -> .srs
        id: compile
        run: |
          set -euo pipefail
          cd sing-box
          
          # 清理旧的 srs 文件，防止 json 被删除后 srs 变成无法清理的“幽灵文件”
          rm -f "$GITHUB_WORKSPACE"/rule-set/*.srs
          
          compiled=0
          for file in "$GITHUB_WORKSPACE"/rule-set/*.json; do
            [ -e "$file" ] || continue
            base_name=$(basename "$file" .json)
            out="$GITHUB_WORKSPACE/rule-set/${base_name}.srs"
            echo "Compiling $file -> $out"
            ./sing-box rule-set compile --output "$out" "$file"
            compiled=1
          done

          if [ "$compiled" -eq 0 ]; then
            echo "No JSON files found in rule-set/ to compile."
          fi

      - name: Commit and push compiled .srs (if changed)
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          cd "$GITHUB_WORKSPACE"
          # -A 会将删除操作也加入暂存区，完美同步 json 的增删改
          git add -A rule-set/*.srs

          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: compile rule-set -> .srs (by GitHub Actions)"
            git push
          fi
