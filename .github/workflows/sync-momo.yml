name: Sync Momo Config
on:
  push:
    paths:
      - 'config/client.json'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync client.json to momo.json
        run: |
          jq --slurpfile momo config/momo.json '
            .inbounds = $momo[0].inbounds |
            .route.rules = [
              .route.rules[] | 
              if .action == "hijack-dns" then 
                {"inbound": "dns-in", "action": "hijack-dns"}
              else 
                . 
              end
            ]
          ' config/client.json > config/momo_new.json
          mv config/momo_new.json config/momo.json

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add config/momo.json
          git commit -m "chore: auto-sync momo.json from client.json" || exit 0
          git push
